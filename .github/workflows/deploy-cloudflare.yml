# 建置 OpenNext 並部署至 Cloudflare（儀表板「Workers & Pages」下 Worker 名稱：ai-seo-website）。
# CLOUDFLARE_API_TOKEN：選填；未設定時略過 wrangler deploy。
# API 金鑰請在 Cloudflare → ai-seo-website → Variables and Secrets（勿寫進 repo）。
name: Deploy Cloudflare Workers (OpenNext)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build OpenNext for Cloudflare
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run cf:build

      - name: Deploy to Cloudflare（若已設定 CLOUDFLARE_API_TOKEN）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::notice::已略過部署：請在 Repository secrets 新增 CLOUDFLARE_API_TOKEN 後再執行。"
            echo "::notice::GOOGLE_GENERATIVE_AI_KEY 等請在 Cloudflare → ai-seo-website → Secrets 設定。"
            exit 0
          fi
          npx opennextjs-cloudflare deploy
