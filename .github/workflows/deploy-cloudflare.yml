# 在 GitHub Actions（Linux）上建置 OpenNext。
# CLOUDFLARE_API_TOKEN：選填；未設定時略過 wrangler deploy（建置仍會跑）。
# GOOGLE_GENERATIVE_AI_KEY：在 Cloudflare Worker 稍後補即可，不影響 CI。
name: Deploy Cloudflare Workers (OpenNext)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build OpenNext for Cloudflare
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run cf:build

      - name: Deploy to Cloudflare（若已設定 CLOUDFLARE_API_TOKEN）
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::notice::已略過部署：請在 Repository secrets 新增 CLOUDFLARE_API_TOKEN 後再執行。"
            echo "::notice::Gemini（GOOGLE_GENERATIVE_AI_KEY）請在 Cloudflare Worker 變數稍後補。"
            exit 0
          fi
          npx opennextjs-cloudflare deploy
