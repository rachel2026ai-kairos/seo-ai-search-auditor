# 在 GitHub Actions（Linux）上建置 OpenNext。
# CLOUDFLARE_API_TOKEN：選填；未設定時只驗證建置、略過 wrangler deploy。
# GOOGLE_GENERATIVE_AI_KEY：在 Cloudflare Worker「變數 / Secrets」稍後補即可，不影響 CI。
name: Deploy Cloudflare Workers (OpenNext)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build OpenNext for Cloudflare
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run cf:build

      # 僅在 Repository 已設定 CLOUDFLARE_API_TOKEN 時部署；未設定則略過（workflow 仍為成功）
      - name: Deploy to Cloudflare
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx opennextjs-cloudflare deploy
